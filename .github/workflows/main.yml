name: CI/CD

on:
  pull_request:
    types: [opened, synchronize, reopened, edited, ready_for_review]
  merge_group:
  push:
    branches:
      - master

permissions: {}

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Validate pull request title
        if: github.event_name == 'pull_request'
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: .github/scripts/validate-pr-title.sh
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .node-version
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --ignore-scripts
      - name: Check version consistency
        run: |
          set +e # We want to handle errors ourselves to provide better messages
          PACKAGE_VERSION=$(jq -r '
            .version |
            if test("^[0-9]+\\.[0-9]+\\.[0-9]+(-[0-9A-Za-z.-]+)?(\\+[0-9A-Za-z.-]+)?$")
            then .
            else error("Invalid semver format in package.json")
            end
          ' package.json 2>&1)
          JQ_EXIT_CODE=$?

          if [ $JQ_EXIT_CODE -ne 0 ]; then
            echo "::error::Invalid semver version in package.json: $PACKAGE_VERSION"
            exit 2
          fi

          MANIFEST_VERSION=$(jq -r '."."' .release-please-manifest.json)
          if [ "$PACKAGE_VERSION" != "$MANIFEST_VERSION" ]; then
            echo "::error::Version mismatch! package.json has $PACKAGE_VERSION but .release-please-manifest.json has $MANIFEST_VERSION"
            exit 5
          fi

          ACTION_TAG=$(grep 'image: docker://ghcr.io' action.yml | sed -E 's/^.*actions-clever-cloud:([^ ]+).*$/\1/' | grep -Eo '^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$')
          GREP_EXIT_CODE=$?
          set -e # Re-enable exit on error

          if [ $GREP_EXIT_CODE -ne 0 ] || [ -z "$ACTION_TAG" ]; then
            echo "::error::Invalid or missing version format in action.yml"
            exit 3
          fi

          if [ "$PACKAGE_VERSION" != "$ACTION_TAG" ]; then
            echo "::error::Version mismatch! package.json has $PACKAGE_VERSION but action.yml has $ACTION_TAG"
            exit 4
          fi

          echo "✅ Versions match: $PACKAGE_VERSION"
      - name: Run knip
        run: pnpm run knip

  ci:
    name: Integration
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .node-version
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --ignore-scripts
      - name: Run integration tests
        run: pnpm run test

  release:
    name: Release
    if: github.event_name == 'push'
    needs: [lint, ci]
    runs-on: ubuntu-latest
    concurrency:
      group: release-please
      cancel-in-progress: false
    permissions:
      contents: write
      issues: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.release-please.outputs.release_created }}
      version: ${{ steps.release-please.outputs.version }}
      sha: ${{ steps.release-please.outputs.sha }}
      prs_created: ${{ steps.release-please.outputs.prs_created }}
      prs: ${{ steps.release-please.outputs.prs }}
    steps:
      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        id: release-please
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          target-branch: master

  dispatch-release-please-candidates:
    name: Dispatch automatic e2e for Release Please candidates
    needs: [release]
    if: needs.release.outputs.prs_created == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      PRS: ${{ needs.release.outputs.prs }}
    steps:
      - uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const prs = JSON.parse(process.env.PRS || '[]');

            for (const pr of prs) {
              if (
                pr.headBranchName !== 'release-please--branches--master' ||
                !pr.labels?.includes('autorelease: pending')
              ) {
                continue;
              }

              await github.rest.repos.createDispatchEvent({
                owner: context.repo.owner,
                repo: context.repo.repo,
                event_type: 'release-please-candidate',
                client_payload: {
                  pr_number: pr.number,
                },
              });
            }

  build:
    name: Build release image
    needs: [release]
    if: needs.release.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    concurrency:
      group: release-build-${{ needs.release.outputs.sha }}
      cancel-in-progress: false
    permissions:
      contents: read
      packages: write
    env:
      RELEASE_SHA: ${{ needs.release.outputs.sha }}
      RELEASE_VERSION: ${{ needs.release.outputs.version }}
    outputs:
      digest: ${{ steps.digest.outputs.digest }}
    steps:
      - name: Login to GitHub Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Check for existing canonical image
        id: existing
        run: |
          canonical="ghcr.io/47ng/actions-clever-cloud:git-${RELEASE_SHA}"
          set +e
          output=$(docker buildx imagetools inspect --format '{{println .Manifest.Digest}}' "$canonical" 2>&1)
          inspect_exit_code=$?
          set -e
          if [ $inspect_exit_code -eq 0 ]; then
            digest=$(echo "$output" | tr -d '[:space:]')
            echo "Canonical image $canonical already exists with digest $digest, skipping rebuild"
            echo "digest=$digest" >> "$GITHUB_OUTPUT"
          elif echo "$output" | grep -qiE 'not found|manifest unknown|name unknown'; then
            echo "Canonical image $canonical does not exist yet, building"
          else
            echo "::error::Failed to inspect $canonical, refusing to rebuild over a possibly existing canonical tag: $output"
            exit 1
          fi
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        if: steps.existing.outputs.digest == ''
        with:
          ref: ${{ needs.release.outputs.sha }}
          persist-credentials: false
      - name: Collect Docker labels
        id: docker-labels
        if: steps.existing.outputs.digest == ''
        run: |
          {
            echo 'labels<<__LABELS_EOF__'
            echo "org.opencontainers.image.title=47ng/actions-clever-cloud"
            echo "org.opencontainers.image.description=GitHub action to deploy to Clever Cloud"
            echo "org.opencontainers.image.version=${RELEASE_VERSION}"
            echo "org.opencontainers.image.revision=${RELEASE_SHA}"
            echo "org.opencontainers.image.licenses=MIT"
            echo "org.opencontainers.image.source=https://github.com/${{ github.repository }}/tree/${RELEASE_SHA}"
            echo "org.opencontainers.image.documentation=https://github.com/${{ github.repository }}/blob/master/README.md"
            echo "org.opencontainers.image.url=https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            echo '__LABELS_EOF__'
          } >> "$GITHUB_OUTPUT"
      - name: Set up QEMU
        if: steps.existing.outputs.digest == ''
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0
      - name: Set up Docker Buildx
        if: steps.existing.outputs.digest == ''
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
      - name: Build and push canonical image
        id: build
        if: steps.existing.outputs.digest == ''
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha,scope=release-image
          cache-to: type=gha,mode=max,scope=release-image
          labels: ${{ steps.docker-labels.outputs.labels }}
          tags: ghcr.io/47ng/actions-clever-cloud:git-${{ needs.release.outputs.sha }}
          push: true
      - name: Resolve image digest
        id: digest
        env:
          EXISTING_DIGEST: ${{ steps.existing.outputs.digest }}
          BUILT_DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          digest="${EXISTING_DIGEST:-$BUILT_DIGEST}"
          if ! echo "$digest" | grep -qE '^sha256:[0-9a-f]{64}$'; then
            echo "::error::Invalid or missing image digest from inspection or build: '$digest'"
            exit 1
          fi
          echo "digest=$digest" >> "$GITHUB_OUTPUT"

  publish:
    name: Publish release image
    needs: [release, build]
    if: needs.release.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    concurrency:
      group: release-publish-${{ needs.release.outputs.sha }}
      cancel-in-progress: false
    permissions:
      packages: write
    env:
      GHCR_IMAGE: ghcr.io/47ng/actions-clever-cloud
      HUB_IMAGE: docker.io/47ng/actions-clever-cloud
      RELEASE_SHA: ${{ needs.release.outputs.sha }}
      RELEASE_VERSION: ${{ needs.release.outputs.version }}
      DIGEST: ${{ needs.build.outputs.digest }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ needs.release.outputs.sha }}
          persist-credentials: false
      - name: Login to registries
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DOCKER_HUB_USER: ${{ secrets.DOCKER_HUB_USER }}
          DOCKER_HUB_PASSWORD: ${{ secrets.DOCKER_HUB_PASSWORD }}
        run: |
          if [ -z "$DOCKER_HUB_USER" ] || [ -z "$DOCKER_HUB_PASSWORD" ]; then
            echo "::error::Missing DOCKER_HUB_USER or DOCKER_HUB_PASSWORD secret, cannot publish to Docker Hub"
            exit 1
          fi
          skopeo login ghcr.io --username "${{ github.repository_owner }}" --password-stdin <<< "$GITHUB_TOKEN"
          skopeo login docker.io --username "$DOCKER_HUB_USER" --password-stdin <<< "$DOCKER_HUB_PASSWORD"
      - name: Promote immutable tags
        run: |
          .github/scripts/promote-image.sh "${GHCR_IMAGE}@${DIGEST}" \
            "${GHCR_IMAGE}:${RELEASE_VERSION}" \
            "${HUB_IMAGE}:${RELEASE_VERSION}" \
            "${HUB_IMAGE}:git-${RELEASE_SHA}"
      - name: Generate step summary
        run: |
          {
            echo "## 🐳 &nbsp;Docker image"
            echo "Version: \`${RELEASE_VERSION}\`"
            echo "Source: \`${RELEASE_SHA}\`"
            echo "Digest: \`${DIGEST}\`"
            echo "### 📌 &nbsp;Immutable tags"
            echo "\`\`\`"
            echo "${GHCR_IMAGE}:${RELEASE_VERSION}"
            echo "${GHCR_IMAGE}:git-${RELEASE_SHA}"
            echo "${HUB_IMAGE}:${RELEASE_VERSION}"
            echo "${HUB_IMAGE}:git-${RELEASE_SHA}"
            echo "\`\`\`"
          } >> "$GITHUB_STEP_SUMMARY"

  latest:
    name: Move latest tags
    needs: [release, build, publish]
    if: needs.release.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    concurrency:
      group: release-latest
      cancel-in-progress: false
    permissions:
      packages: write
    env:
      GHCR_IMAGE: ghcr.io/47ng/actions-clever-cloud
      HUB_IMAGE: docker.io/47ng/actions-clever-cloud
      RELEASE_VERSION: ${{ needs.release.outputs.version }}
      DIGEST: ${{ needs.build.outputs.digest }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ needs.release.outputs.sha }}
          persist-credentials: false
      - name: Login to registries
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DOCKER_HUB_USER: ${{ secrets.DOCKER_HUB_USER }}
          DOCKER_HUB_PASSWORD: ${{ secrets.DOCKER_HUB_PASSWORD }}
        run: |
          if [ -z "$DOCKER_HUB_USER" ] || [ -z "$DOCKER_HUB_PASSWORD" ]; then
            echo "::error::Missing DOCKER_HUB_USER or DOCKER_HUB_PASSWORD secret, cannot publish to Docker Hub"
            exit 1
          fi
          skopeo login ghcr.io --username "${{ github.repository_owner }}" --password-stdin <<< "$GITHUB_TOKEN"
          skopeo login docker.io --username "$DOCKER_HUB_USER" --password-stdin <<< "$DOCKER_HUB_PASSWORD"
      - name: Move latest tags
        run: |
          .github/scripts/move-latest.sh "${GHCR_IMAGE}@${DIGEST}" \
            "${GHCR_IMAGE}:latest" \
            "${HUB_IMAGE}:latest"
