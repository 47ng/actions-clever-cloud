name: Clever Cloud E2E (manual)

on:
  workflow_dispatch:
    inputs:
      head_sha:
        description: Full 40-character SHA for the current internal pull request head
        required: true
        type: string

permissions: {}

jobs:
  resolve:
    name: Resolve internal pull request
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      head_sha: ${{ steps.resolve.outputs.head_sha }}
      pr_number: ${{ steps.resolve.outputs.pr_number }}
      candidate_source_repository: ${{ steps.resolve.outputs.candidate_source_repository }}
    steps:
      - name: Checkout trusted workflow definition
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.sha }}
          persist-credentials: false

      - name: Resolve current internal pull request head
        id: resolve
        env:
          HEAD_SHA: ${{ inputs.head_sha }}
          RUN_REF: ${{ github.ref }}
          GH_TOKEN: ${{ github.token }}
        run: node src/e2e/scripts/resolve-manual-candidate.ts

  candidate:
    name: Resolve verified candidate image
    needs: resolve
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    outputs:
      digest: ${{ steps.candidate.outputs.digest }}
      image: ${{ steps.candidate.outputs.image }}
    steps:
      - name: Checkout trusted workflow definition
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.sha }}
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Login to GitHub Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve verified candidate image
        id: candidate
        env:
          CANDIDATE_IMAGE: ghcr.io/47ng/actions-clever-cloud:git-${{ needs.resolve.outputs.head_sha }}
          EXPECTED_REVISION: ${{ needs.resolve.outputs.head_sha }}
          EXPECTED_SOURCE_REPOSITORY: ${{ needs.resolve.outputs.candidate_source_repository }}
        run: node src/e2e/scripts/verify-image.ts

  create-and-delete:
    name: Create and delete app
    needs: [resolve, candidate]
    uses: ./.github/workflows/e2e-reusable.yml
    permissions:
      contents: read
      pull-requests: read
    secrets: inherit
    with:
      head_sha: ${{ needs.resolve.outputs.head_sha }}
      pr_number: ${{ needs.resolve.outputs.pr_number }}
      candidate_digest: ${{ needs.candidate.outputs.digest }}
      candidate_image: ${{ needs.candidate.outputs.image }}
      candidate_source_repository: ${{ needs.resolve.outputs.candidate_source_repository }}
      trusted_workflow_sha: ${{ github.sha }}
      caller: manual
