                  instanceId: process.env.HEALTHY_OBSERVED_INSTANCE_ID || null,
                  commitId:
                    process.env.HEALTHY_OBSERVED_COMMIT_ID ||
                    process.env.HEALTHY_COMMIT ||
                    null,
                  deploymentId: process.env.HEALTHY_OBSERVED_DEPLOYMENT_ID || null,
                  candidateActionLogs: ['candidate-action/001-deploy-healthy.log']
                },
                {
                  name: 'deploy-healthy-fixture-env-check',
                  outcome: buildSuccessfulScenarioOutcome(
                    process.env.DEPLOY_ENV_OUTCOME,
                    process.env.OBSERVE_ENV_OUTCOME,
                    process.env.VERIFY_ENV_LOG_OUTCOME
                  ),
                  baselineInstanceId: null,
                  instanceId: process.env.ENV_OBSERVED_INSTANCE_ID || null,
                  commitId:
                    process.env.ENV_OBSERVED_COMMIT_ID ||
                    process.env.ENV_COMMIT ||
                    null,
                  deploymentId: process.env.ENV_OBSERVED_DEPLOYMENT_ID || null,
                  candidateActionLogs: ['candidate-action/002-deploy-env.log']
                },
                {
                  name: 'same-commit-error',
                  outcome: buildExpectedFailureOutcome({
                    actionOutcome: process.env.SAME_COMMIT_ERROR_OUTCOME,
                    assertionOutcome: process.env.ASSERT_SAME_COMMIT_ERROR_OUTCOME
                  }),
                  baselineInstanceId: process.env.SAME_COMMIT_BASELINE_INSTANCE_ID || null,
                  instanceId: process.env.SAME_COMMIT_BASELINE_INSTANCE_ID || null,
                  commitId: process.env.SAME_COMMIT_BASELINE_COMMIT_ID || null,
                  deploymentId: null,
                  candidateActionLogs: ['candidate-action/003-same-commit-error.log']
                },
                {
                  name: 'same-commit-ignore',
                  outcome: buildSuccessfulScenarioOutcome(
                    process.env.SAME_COMMIT_IGNORE_OUTCOME,
                    process.env.OBSERVE_SAME_COMMIT_IGNORE_OUTCOME
                  ),
                  baselineInstanceId: process.env.SAME_COMMIT_BASELINE_INSTANCE_ID || null,
                  instanceId:
                    process.env.SAME_COMMIT_IGNORE_INSTANCE_ID ||
                    process.env.SAME_COMMIT_BASELINE_INSTANCE_ID ||
                    null,
                  commitId:
                    process.env.SAME_COMMIT_IGNORE_COMMIT_ID ||
                    process.env.SAME_COMMIT_BASELINE_COMMIT_ID ||
                    null,
                  deploymentId:
                    process.env.SAME_COMMIT_IGNORE_DEPLOYMENT_ID ||
                    process.env.SAME_COMMIT_BASELINE_DEPLOYMENT_ID ||
                    null,
                  candidateActionLogs: ['candidate-action/004-same-commit-ignore.log']
                },
                {
                  name: 'same-commit-restart',
                  outcome: buildSuccessfulScenarioOutcome(
                    process.env.SAME_COMMIT_RESTART_OUTCOME,
                    process.env.OBSERVE_SAME_COMMIT_RESTART_OUTCOME
                  ),
                  baselineInstanceId:
                    process.env.SAME_COMMIT_RESTART_BASELINE_INSTANCE_ID || null,
                  instanceId: process.env.SAME_COMMIT_RESTART_INSTANCE_ID || null,
                  commitId: process.env.SAME_COMMIT_RESTART_COMMIT_ID || null,
                  deploymentId: process.env.SAME_COMMIT_RESTART_DEPLOYMENT_ID || null,
                  candidateActionLogs: ['candidate-action/005-same-commit-restart.log']
                },
                {
                  name: 'same-commit-rebuild',
                  outcome: buildSuccessfulScenarioOutcome(
                    process.env.SAME_COMMIT_REBUILD_OUTCOME,
                    process.env.OBSERVE_SAME_COMMIT_REBUILD_OUTCOME
                  ),
                  baselineInstanceId:
                    process.env.SAME_COMMIT_REBUILD_BASELINE_INSTANCE_ID || null,
                  instanceId: process.env.SAME_COMMIT_REBUILD_INSTANCE_ID || null,
                  commitId: process.env.SAME_COMMIT_REBUILD_COMMIT_ID || null,
                  deploymentId: process.env.SAME_COMMIT_REBUILD_DEPLOYMENT_ID || null,
                  candidateActionLogs: ['candidate-action/006-same-commit-rebuild.log']
                },
                {
                  name: 'build-failure',
                  outcome: buildExpectedFailureOutcome({
                    actionOutcome: process.env.BUILD_FAILURE_OUTCOME,
                    assertionOutcome: process.env.ASSERT_BUILD_FAILURE_OUTCOME
                  }),
                  baselineInstanceId:
                    process.env.FAILED_DEPLOY_BASELINE_INSTANCE_ID || null,
                  instanceId: process.env.BUILD_FAILURE_INSTANCE_ID || null,
                  commitId: process.env.BUILD_FAILURE_COMMIT || null,
                  deploymentId: process.env.BUILD_FAILURE_DEPLOYMENT_ID || null,
                  candidateActionLogs: ['candidate-action/007-build-failure.log']
                },
                {
                  name: 'startup-failure',
                  outcome: buildExpectedFailureOutcome({
                    actionOutcome: process.env.STARTUP_FAILURE_OUTCOME,
                    assertionOutcome: process.env.ASSERT_STARTUP_FAILURE_OUTCOME
                  }),
                  baselineInstanceId:
                    process.env.FAILED_DEPLOY_BASELINE_INSTANCE_ID || null,
                  instanceId: process.env.STARTUP_FAILURE_INSTANCE_ID || null,
                  commitId: process.env.STARTUP_FAILURE_COMMIT || null,
                  deploymentId: process.env.STARTUP_FAILURE_DEPLOYMENT_ID || null,
                  candidateActionLogs: ['candidate-action/008-startup-failure.log']
                },
                {
                  name: 'recovery',
                  outcome: buildSuccessfulScenarioOutcome(
                    process.env.RECOVERY_OUTCOME,
                    process.env.OBSERVE_RECOVERY_OUTCOME
                  ),
                  baselineInstanceId:
                    process.env.FAILED_DEPLOY_BASELINE_INSTANCE_ID || null,
                  instanceId: process.env.RECOVERY_INSTANCE_ID || null,
                  commitId:
                    process.env.RECOVERY_COMMIT_ID ||
                    process.env.RECOVERY_COMMIT ||
                    null,
                  deploymentId: process.env.RECOVERY_DEPLOYMENT_ID || null,
                  candidateActionLogs: ['candidate-action/009-recovery.log']
                },
                {
                  name: 'divergent-no-force',
                  outcome: buildExpectedFailureOutcome({
                    actionOutcome: process.env.DIVERGENT_NO_FORCE_OUTCOME,
                    assertionOutcome: process.env.ASSERT_DIVERGENT_NO_FORCE_OUTCOME
                  }),
                  baselineInstanceId: process.env.FORCE_BASELINE_INSTANCE_ID || null,
                  instanceId:
                    process.env.DIVERGENT_NO_FORCE_INSTANCE_ID ||
                    process.env.FORCE_BASELINE_INSTANCE_ID ||
                    null,
                  commitId: process.env.DIVERGENT_NO_FORCE_COMMIT_ID || null,
                  deploymentId: process.env.DIVERGENT_NO_FORCE_DEPLOYMENT_ID || null,
                  candidateActionLogs: ['candidate-action/010-divergent-no-force.log']
                },
                {
                  name: 'divergent-force',
                  outcome: buildSuccessfulScenarioOutcome(
                    process.env.DIVERGENT_FORCE_OUTCOME,
                    process.env.OBSERVE_DIVERGENT_FORCE_OUTCOME
                  ),
                  baselineInstanceId: process.env.FORCE_BASELINE_INSTANCE_ID || null,
                  instanceId: process.env.DIVERGENT_FORCE_INSTANCE_ID || null,
                  commitId:
                    process.env.DIVERGENT_FORCE_COMMIT_ID ||
                    process.env.DIVERGENT_FORCE_COMMIT ||
                    null,
                  deploymentId: process.env.DIVERGENT_FORCE_DEPLOYMENT_ID || null,
                  candidateActionLogs: ['candidate-action/011-divergent-force.log']
                },
                {
                  name: 'timeout-cancelled',
                  outcome: buildSuccessfulScenarioOutcome(
                    process.env.TIMEOUT_DEPLOY_OUTCOME,
                    process.env.ASSERT_TIMEOUT_DEPLOY_OUTCOME,
                    process.env.OBSERVE_TIMEOUT_DEPLOY_OUTCOME
                  ),
                  baselineInstanceId: process.env.TIMEOUT_BASELINE_INSTANCE_ID || null,
                  instanceId:
                    process.env.TIMEOUT_INSTANCE_ID ||
                    process.env.TIMEOUT_BASELINE_INSTANCE_ID ||
                    null,
                  commitId:
                    process.env.TIMEOUT_COMMIT_ID ||
                    process.env.TIMEOUT_COMMIT ||
                    null,
                  deploymentId: process.env.TIMEOUT_DEPLOYMENT_ID || null,
                  candidateActionLogs: ['candidate-action/012-timeout.log']
                }
              ]
            })
          )
          EOF

      - name: Delete the captured app
        if: always() && steps.candidate-state.outputs.proceed == 'true'
        id: delete-app
        env:
          CLEVER_TOKEN: ${{ secrets.CLEVER_TOKEN }}
          CLEVER_SECRET: ${{ secrets.CLEVER_SECRET }}
          E2E_HEALTH_VALUE: ${{ steps.health-value.outputs.value }}
          APP_ID: ${{ steps.create.outputs.app_id }}
          APP_NAME: ${{ steps.create.outputs.app_name }}
          APP_ID_FILE: ${{ github.workspace }}/.e2e-state/app.json
          HAS_APP_ID_FILE: ${{ hashFiles('.e2e-state/app.json') != '' }}
          OUTPUT_DIR: ${{ github.workspace }}/.e2e-artifacts/upload
          RESULTS_PATH: ${{ github.workspace }}/.e2e-state/suite-results.json
          HEALTHY_LOG_PATH: ${{ github.workspace }}/.e2e-artifacts/candidate-action/001-deploy-healthy.log
          ENV_LOG_PATH: ${{ github.workspace }}/.e2e-artifacts/candidate-action/002-deploy-env.log
          SAME_COMMIT_ERROR_LOG_PATH: ${{ github.workspace }}/.e2e-artifacts/candidate-action/003-same-commit-error.log
          SAME_COMMIT_IGNORE_LOG_PATH: ${{ github.workspace }}/.e2e-artifacts/candidate-action/004-same-commit-ignore.log
          SAME_COMMIT_RESTART_LOG_PATH: ${{ github.workspace }}/.e2e-artifacts/candidate-action/005-same-commit-restart.log
          SAME_COMMIT_REBUILD_LOG_PATH: ${{ github.workspace }}/.e2e-artifacts/candidate-action/006-same-commit-rebuild.log
          BUILD_FAILURE_LOG_PATH: ${{ github.workspace }}/.e2e-artifacts/candidate-action/007-build-failure.log
          STARTUP_FAILURE_LOG_PATH: ${{ github.workspace }}/.e2e-artifacts/candidate-action/008-startup-failure.log
          RECOVERY_LOG_PATH: ${{ github.workspace }}/.e2e-artifacts/candidate-action/009-recovery.log
          DIVERGENT_NO_FORCE_LOG_PATH: ${{ github.workspace }}/.e2e-artifacts/candidate-action/010-divergent-no-force.log
          DIVERGENT_FORCE_LOG_PATH: ${{ github.workspace }}/.e2e-artifacts/candidate-action/011-divergent-force.log
          TIMEOUT_LOG_PATH: ${{ github.workspace }}/.e2e-artifacts/candidate-action/012-timeout.log
        run: |
          node --input-type=module <<'EOF'
          import { Buffer } from 'node:buffer'
          import { execFile } from 'node:child_process'
          import { constants } from 'node:fs'
          import {
            access,
            appendFile,
            mkdir,
            readFile,
            readdir,
            rm,
            writeFile
          } from 'node:fs/promises'
          import path from 'node:path'
          import { promisify } from 'node:util'

          const REDACTION = '[REDACTED]'
          const execFileAsync = promisify(execFile)
          const githubOutput = process.env.GITHUB_OUTPUT
          const hasAppIdFile = process.env.HAS_APP_ID_FILE === 'true'
          const outputDir = process.env.OUTPUT_DIR
          const resultsPath = process.env.RESULTS_PATH
          const healthyLogPath = process.env.HEALTHY_LOG_PATH
          const envLogPath = process.env.ENV_LOG_PATH
          const sameCommitErrorLogPath = process.env.SAME_COMMIT_ERROR_LOG_PATH
          const sameCommitIgnoreLogPath = process.env.SAME_COMMIT_IGNORE_LOG_PATH
          const sameCommitRestartLogPath = process.env.SAME_COMMIT_RESTART_LOG_PATH
          const sameCommitRebuildLogPath = process.env.SAME_COMMIT_REBUILD_LOG_PATH
          const buildFailureLogPath = process.env.BUILD_FAILURE_LOG_PATH
          const startupFailureLogPath = process.env.STARTUP_FAILURE_LOG_PATH
          const recoveryLogPath = process.env.RECOVERY_LOG_PATH
          const divergentNoForceLogPath = process.env.DIVERGENT_NO_FORCE_LOG_PATH
          const divergentForceLogPath = process.env.DIVERGENT_FORCE_LOG_PATH
          const timeoutLogPath = process.env.TIMEOUT_LOG_PATH
          const token = process.env.CLEVER_TOKEN
          const secret = process.env.CLEVER_SECRET
          const healthValue = process.env.E2E_HEALTH_VALUE
          let appId = process.env.APP_ID
          let appName = process.env.APP_NAME
          const appIdFile = process.env.APP_ID_FILE
          const cleverCLI = `${process.env.GITHUB_WORKSPACE}/.candidate-source/node_modules/.bin/clever`

          if (
            !outputDir ||
            !resultsPath ||
            !healthyLogPath ||
            !envLogPath ||
            !sameCommitErrorLogPath ||
            !sameCommitIgnoreLogPath ||
            !sameCommitRestartLogPath ||
            !sameCommitRebuildLogPath ||
            !buildFailureLogPath ||
            !startupFailureLogPath ||
            !recoveryLogPath ||
            !divergentNoForceLogPath ||
            !divergentForceLogPath ||
            !timeoutLogPath ||
            !token ||
            !secret
          ) {
            throw new Error('Missing teardown or failure evidence inputs')
          }

          const APP_ID_REGEX = /^app_[0-9a-f]{8}(?:-[0-9a-f]{4}){3}-[0-9a-f]{12}$/
          const COMMAND_TIMEOUT_MS = 30_000
          const SETTLE_TIMEOUT_MS = 10 * 60_000
          const POLL_INTERVAL_MS = 5_000
          const IN_PROGRESS_STATES = new Set(['WIP', 'PENDING', 'QUEUED', 'RUNNING'])
          const CANCELLABLE_STATES = new Set(['WIP'])

          function messageFrom(error) {
            return error instanceof Error ? error.message : String(error)
          }

          function remainingBeforeDeadline(deadlineAt) {
            return Math.max(0, deadlineAt - Date.now())
          }

          async function sleepUntilNextPoll(deadlineAt) {
            await new Promise(resolve =>
              setTimeout(resolve, Math.min(POLL_INTERVAL_MS, remainingBeforeDeadline(deadlineAt)))
            )
          }

          async function runCleverCommand(args, timeoutMs = COMMAND_TIMEOUT_MS) {
            try {
              const { stdout, stderr } = await execFileAsync(cleverCLI, args, {
                encoding: 'utf8',
                env: process.env,
                timeout: timeoutMs,
                maxBuffer: 1024 * 1024 * 10,
              })
              return { stdout, stderr }
            } catch (error) {
              throw new Error(error.stderr?.trim() || error.message)
            }
          }

          async function listActivity(appId, timeoutMs = COMMAND_TIMEOUT_MS) {
            const result = await runCleverCommand(
              ['activity', '--app', appId, '--format', 'json'],
              timeoutMs
            )

            return JSON.parse(result.stdout)
          }

          async function readActiveDeployments(appId, timeoutMs = COMMAND_TIMEOUT_MS) {
            return (await listActivity(appId, timeoutMs)).filter(
              deployment =>
                deployment.action === 'DEPLOY' &&
                IN_PROGRESS_STATES.has(deployment.state ?? '')
            )
          }

          async function listApplications(timeoutMs = COMMAND_TIMEOUT_MS) {
            const result = await runCleverCommand(
              ['applications', 'list', '--format', 'json'],
              timeoutMs
            )

            return JSON.parse(result.stdout)
          }

          async function verifyApplicationDeletion(appId) {
            const organisations = await listApplications()
            const isStillPresent = organisations.some(organisation =>
              organisation.applications?.some(application => application.app_id === appId)
            )

            if (isStillPresent) {
              throw new Error(`Application ${appId} still exists after deletion`)
            }
          }

          async function waitForDeploymentState({
            appId,
            deploymentId,
            expectedState,
            timeoutMs = SETTLE_TIMEOUT_MS
          }) {
            const deadline = Date.now() + timeoutMs
            let lastObservedState = '(missing)'

            for (;;) {
              const deployment = (
                await listActivity(
                  appId,
                  Math.min(COMMAND_TIMEOUT_MS, Math.max(1, remainingBeforeDeadline(deadline)))
                )
              ).find(activity => activity.uuid === deploymentId)

              if (deployment?.state) {
                lastObservedState = deployment.state
              }

              if (Date.now() >= deadline) {
                throw new Error(
                  `Timed out while waiting for deployment ${deploymentId} on ${appId} to reach ${expectedState}. Last state: ${lastObservedState}`
                )
              }

              if (deployment?.state === expectedState) {
                return deployment
              }

              await sleepUntilNextPoll(deadline)
            }
          }

          async function waitForLatestCancellableDeployment({
            appId,
            deploymentId,
            timeoutMs = SETTLE_TIMEOUT_MS,
            returnSettled = false
          }) {
            const deadline = Date.now() + timeoutMs
            let lastObservedState = '(missing)'

            for (;;) {
              const activity = await listActivity(
                appId,
                Math.min(COMMAND_TIMEOUT_MS, Math.max(1, remainingBeforeDeadline(deadline)))
              )
              const activeDeployments = activity.filter(
                deployment =>
                  deployment.action === 'DEPLOY' &&
                  IN_PROGRESS_STATES.has(deployment.state ?? '')
              )
              const latestActiveDeployment = activeDeployments[0]
              const matchingDeployment = activity.find(
                deployment => deployment.uuid === deploymentId
              )

              if (matchingDeployment?.state) {
                lastObservedState = matchingDeployment.state
              }

              if (
                matchingDeployment?.uuid === deploymentId &&
                matchingDeployment.state &&
                !IN_PROGRESS_STATES.has(matchingDeployment.state)
              ) {
                if (returnSettled) {
                  return null
                }

                throw new Error(
                  `Deployment ${deploymentId} on ${appId} reached ${matchingDeployment.state} before it could be cancelled`
                )
              }

              if (Date.now() >= deadline) {
                throw new Error(
                  `Timed out while waiting for deployment ${deploymentId} on ${appId} to become the latest WIP deployment. Last state: ${lastObservedState}`
                )
              }

              if (
                latestActiveDeployment?.uuid === deploymentId &&
                CANCELLABLE_STATES.has(latestActiveDeployment.state ?? '')
              ) {
                return latestActiveDeployment
              }

              await sleepUntilNextPoll(deadline)
            }
          }

          async function cancelDeployment({
            appId,
            deploymentId,
            timeoutMs = SETTLE_TIMEOUT_MS
          }) {
            const deadline = Date.now() + timeoutMs
            const cancellableDeployment = await waitForLatestCancellableDeployment({
              appId,
              deploymentId,
              timeoutMs: remainingBeforeDeadline(deadline)
            })

            if (!cancellableDeployment) {
              throw new Error(
                `Deployment ${deploymentId} on ${appId} settled before it could be cancelled`
              )
            }

            await runCleverCommand(
              ['cancel-deploy', '--app', appId],
              Math.min(COMMAND_TIMEOUT_MS, Math.max(1, remainingBeforeDeadline(deadline)))
            )

            return waitForDeploymentState({
              appId,
              deploymentId,
              expectedState: 'CANCELLED',
              timeoutMs: remainingBeforeDeadline(deadline)
            })
          }

          async function deleteApplication({ appId, name }) {
            try {
              const deadline = Date.now() + SETTLE_TIMEOUT_MS

              for (;;) {
                const activeDeployments = await readActiveDeployments(
                  appId,
                  Math.min(COMMAND_TIMEOUT_MS, Math.max(1, remainingBeforeDeadline(deadline)))
                )

                if (activeDeployments.length === 0) {
                  break
                }

                const latestActiveDeployment = activeDeployments[0]

                if (!latestActiveDeployment?.uuid) {
                  throw new Error(`Missing active deployment ID for ${appId}`)
                }

                const cancellableDeployment = await waitForLatestCancellableDeployment({
                  appId,
                  deploymentId: latestActiveDeployment.uuid,
                  timeoutMs: remainingBeforeDeadline(deadline),
                  returnSettled: true
                })

                if (!cancellableDeployment) {
                  continue
                }

                await runCleverCommand(
                  ['cancel-deploy', '--app', appId],
                  Math.min(COMMAND_TIMEOUT_MS, Math.max(1, remainingBeforeDeadline(deadline)))
                )

                await waitForDeploymentState({
                  appId,
                  deploymentId: cancellableDeployment.uuid,
                  expectedState: 'CANCELLED',
                  timeoutMs: remainingBeforeDeadline(deadline)
                })
              }

              await runCleverCommand(['delete', '--app', appId, '--yes'])
              await verifyApplicationDeletion(appId)
            } catch (error) {
              throw new Error(`Failed to delete ${name} (${appId}): ${messageFrom(error)}`)
            }
          }

          function buildSensitivePatterns(credentials) {
            const combined = `${credentials.token}:${credentials.secret}`
            const values = [
              credentials.token,
              credentials.secret,
              combined,
              credentials.healthValue
            ].filter(Boolean)

            return Array.from(
              new Set(
                values.flatMap(value => {
                  const base64 = Buffer.from(value, 'utf8').toString('base64')

                  return [
                    value,
                    encodeURIComponent(value),
                    base64,
                    base64.replaceAll('+', '-').replaceAll('/', '_').replace(/=+$/u, '')
                  ]
                })
              )
            ).sort((left, right) => right.length - left.length)
          }

          function redactArtifactContent(content, credentials) {
            let redacted = content

            for (const pattern of buildSensitivePatterns(credentials)) {
              redacted = redacted.split(pattern).join(REDACTION)
            }

            return redacted
          }

          function scanArtifactContent(content, credentials) {
            for (const pattern of buildSensitivePatterns(credentials)) {
              if (content.includes(pattern)) {
                throw new Error('Artifact still contains redaction target content')
              }
            }
          }

          function assertSafeArtifactPath(artifactPath) {
            if (
              artifactPath.startsWith('/') ||
              artifactPath.split('/').some(segment => segment === '..' || segment === '.' || segment === '') ||
              !/^[A-Za-z0-9._/-]+$/.test(artifactPath)
            ) {
              throw new Error(`Unsafe artifact path: ${artifactPath}`)
            }

            return artifactPath
          }

          async function listPreparedEvidenceFiles(directory) {
            const entries = await readdir(directory, {
              withFileTypes: true
            })

            const files = await Promise.all(
              entries.map(async entry => {
                const entryPath = path.join(directory, entry.name)

                if (entry.isDirectory()) {
                  return listPreparedEvidenceFiles(entryPath)
                }

                if (entry.isFile()) {
                  return [entryPath]
                }

                return []
              })
            )

            return files.flat()
          }

          async function prepareFailureEvidence({ outputDir, candidates, credentials }) {
            await rm(outputDir, {
              force: true,
              recursive: true
            })

            for (const candidate of candidates) {
              const artifactPath = assertSafeArtifactPath(candidate.artifactPath)
              const redacted = redactArtifactContent(
                await readFile(candidate.sourcePath, 'utf8'),
                credentials
              )

              scanArtifactContent(redacted, credentials)

              const destinationPath = path.join(outputDir, artifactPath)
              await mkdir(path.dirname(destinationPath), {
                recursive: true
              })
              await writeFile(destinationPath, redacted, 'utf8')
            }
          }

          async function verifyPreparedFailureEvidence({ outputDir, credentials }) {
            for (const filePath of await listPreparedEvidenceFiles(outputDir)) {
              scanArtifactContent(await readFile(filePath, 'utf8'), credentials)
            }
          }

          async function buildEvidenceCandidates() {
            const candidates = [
              {
                sourcePath: resultsPath,
                artifactPath: 'suite-results.json'
              }
            ]

            for (const logCandidate of [
              {
                sourcePath: healthyLogPath,
                artifactPath: 'candidate-action/001-deploy-healthy.log'
              },
              {
                sourcePath: envLogPath,
                artifactPath: 'candidate-action/002-deploy-env.log'
              },
              {
                sourcePath: sameCommitErrorLogPath,
                artifactPath: 'candidate-action/003-same-commit-error.log'
              },
              {
                sourcePath: sameCommitIgnoreLogPath,
                artifactPath: 'candidate-action/004-same-commit-ignore.log'
              },
              {
                sourcePath: sameCommitRestartLogPath,
                artifactPath: 'candidate-action/005-same-commit-restart.log'
              },
              {
                sourcePath: sameCommitRebuildLogPath,
                artifactPath: 'candidate-action/006-same-commit-rebuild.log'
              },
              {
                sourcePath: buildFailureLogPath,
                artifactPath: 'candidate-action/007-build-failure.log'
              },
              {
                sourcePath: startupFailureLogPath,
                artifactPath: 'candidate-action/008-startup-failure.log'
              },
              {
                sourcePath: recoveryLogPath,
                artifactPath: 'candidate-action/009-recovery.log'
              },
              {
                sourcePath: divergentNoForceLogPath,
                artifactPath: 'candidate-action/010-divergent-no-force.log'
              },
              {
                sourcePath: divergentForceLogPath,
                artifactPath: 'candidate-action/011-divergent-force.log'
              },
              {
                sourcePath: timeoutLogPath,
                artifactPath: 'candidate-action/012-timeout.log'
              }
            ]) {
              try {
                await access(logCandidate.sourcePath, constants.F_OK)
                candidates.push(logCandidate)
              } catch (error) {
                if (!error || typeof error !== 'object' || !('code' in error) || error.code !== 'ENOENT') {
                  throw error
                }
              }
            }

            return candidates
          }

          const credentials = { token, secret, healthValue }
          const errors = []
          let evidencePrepared = false

          try {
            await prepareFailureEvidence({
              outputDir,
              candidates: await buildEvidenceCandidates(),
              credentials
            })
            evidencePrepared = true
          } catch (error) {
            errors.push(`Failure evidence preparation failed: ${messageFrom(error)}`)
          }

          if ((!appId || !appName) && hasAppIdFile && appIdFile) {
            try {
              const persisted = JSON.parse(await readFile(appIdFile, 'utf8'))
              appId ??= persisted.appId
              appName ??= persisted.name
            } catch (error) {
              errors.push(`Failed to read captured app identity: ${messageFrom(error)}`)
            }
          }

          if (appId && !APP_ID_REGEX.test(appId)) {
            errors.push(`Invalid captured app ID for teardown: ${appId}`)
          } else if (appId && appName) {
            try {
              await deleteApplication({ appId, name: appName })
            } catch (error) {
              errors.push(`App teardown failed: ${messageFrom(error)}`)
            }
          }

          if (evidencePrepared) {
            try {
              await verifyPreparedFailureEvidence({
                outputDir,
                credentials
              })
              if (githubOutput) {
                await appendFile(githubOutput, 'failure_evidence_ready=true\n')
              }
            } catch (error) {
              errors.push(`Failure evidence verification failed: ${messageFrom(error)}`)
            }
          }

          if ((!appId || !appName) && (hasAppIdFile || Boolean(process.env.APP_ID) || Boolean(process.env.APP_NAME))) {
            errors.push('Missing captured app identity for teardown')
          }

          if (errors.length > 0) {
            for (const errorMessage of errors) {
              console.error(`::error::${errorMessage}`)
            }
            throw new Error(errors.join('\n'))
          }
          EOF

      - name: Write GitHub step summary
        if: always() && steps.candidate-state.outputs.proceed == 'true'
        env:
          RESULTS_PATH: ${{ github.workspace }}/.e2e-state/suite-results.json
          HEAD_SHA: ${{ inputs.head_sha }}
          CANDIDATE_DIGEST: ${{ inputs.candidate_digest }}
          CANDIDATE_IMAGE: ${{ inputs.candidate_image }}
          CALLER: ${{ inputs.caller }}
          TEARDOWN_OUTCOME: ${{ steps.delete-app.outcome }}
          FAILURE_EVIDENCE_READY: ${{ steps.delete-app.outputs.failure_evidence_ready }}
        run: |
          node --input-type=module <<'EOF'
          import { appendFile, readFile } from 'node:fs/promises'
          import { buildSuiteStepSummary } from './.candidate-source/src/e2e/evidence.ts'

          const resultsPath = process.env.RESULTS_PATH
          const headSha = process.env.HEAD_SHA
          const candidateDigest = process.env.CANDIDATE_DIGEST
          const candidateImage = process.env.CANDIDATE_IMAGE
          const caller = process.env.CALLER
          const teardownOutcome = process.env.TEARDOWN_OUTCOME
          const summaryPath = process.env.GITHUB_STEP_SUMMARY

          if (
            !resultsPath ||
            !headSha ||
            !candidateDigest ||
            !candidateImage ||
            !caller ||
            !teardownOutcome ||
            !summaryPath
          ) {
            throw new Error('Missing GitHub step summary inputs')
          }

          let suiteResults = {
            candidate: {
              headSha,
              imageDigest: candidateDigest,
              imageReference: candidateImage,
            },
            app: {
              id: null,
              name: null,
            },
            scenarios: [],
          }

          try {
            suiteResults = JSON.parse(await readFile(resultsPath, 'utf8'))
          } catch (error) {
            if (!error || typeof error !== 'object' || !('code' in error) || error.code !== 'ENOENT') {
              throw error
            }
          }

          await appendFile(
            summaryPath,
            buildSuiteStepSummary({
              suiteResults,
              caller,
              teardownOutcome,
              failureEvidenceReady: process.env.FAILURE_EVIDENCE_READY === 'true'
            })
          )
          EOF

      - name: Upload failure evidence
        if: failure() && steps.delete-app.outputs.failure_evidence_ready == 'true'
        uses: actions/upload-artifact@65462800fd760344b1a7b4382951275a0abb4808 # v4.3.3
        with:
          name: clever-cloud-e2e-failure-${{ github.run_id }}-${{ github.run_attempt }}
          path: .e2e-artifacts/upload
          if-no-files-found: error
          retention-days: 3
