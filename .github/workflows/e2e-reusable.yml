name: Clever Cloud E2E (reusable)

on:
  workflow_call:
    inputs:
      head_sha:
        required: true
        type: string
      pr_number:
        required: true
        type: string
      candidate_digest:
        required: true
        type: string
      candidate_image:
        required: true
        type: string
      candidate_source_repository:
        required: true
        type: string
      caller:
        required: true
        type: string

permissions: {}

concurrency:
  group: clever-cloud-e2e-${{ inputs.pr_number }}
  cancel-in-progress: false

jobs:
  create-and-delete:
    name: Create and delete app
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    environment:
      name: clever-cloud-e2e
    steps:
      - name: Validate candidate identity inputs
        env:
          HEAD_SHA: ${{ inputs.head_sha }}
          PR_NUMBER: ${{ inputs.pr_number }}
          CANDIDATE_DIGEST: ${{ inputs.candidate_digest }}
          CANDIDATE_IMAGE: ${{ inputs.candidate_image }}
          CANDIDATE_SOURCE_REPOSITORY: ${{ inputs.candidate_source_repository }}
          CALLER: ${{ inputs.caller }}
        run: |
          node --input-type=module <<'EOF'
          const headSha = process.env.HEAD_SHA
          const prNumber = process.env.PR_NUMBER
          const candidateDigest = process.env.CANDIDATE_DIGEST
          const candidateImage = process.env.CANDIDATE_IMAGE
          const candidateSourceRepository = process.env.CANDIDATE_SOURCE_REPOSITORY
          const caller = process.env.CALLER
          const thisRepo = process.env.GITHUB_REPOSITORY

          if (!/^[0-9a-f]{40}$/.test(headSha ?? '')) {
            throw new Error('head_sha must be a full 40-character lowercase hex commit SHA.')
          }

          if (!/^\d+$/.test(prNumber ?? '')) {
            throw new Error('pr_number must be a decimal pull request number.')
          }

          if (!/^sha256:[0-9a-f]{64}$/.test(candidateDigest ?? '')) {
            throw new Error('candidate_digest must be a canonical sha256 digest.')
          }

          if (!/^ghcr\.io\/47ng\/actions-clever-cloud@sha256:[0-9a-f]{64}$/.test(candidateImage ?? '')) {
            throw new Error('candidate_image must be pinned to a canonical sha256 digest.')
          }

          if (!candidateImage?.endsWith(`@${candidateDigest}`)) {
            throw new Error(
              `candidate_image must end with ${candidateDigest}, got ${candidateImage ?? '(missing)'}`
            )
          }

          if (!thisRepo || candidateSourceRepository !== thisRepo) {
            throw new Error(
              `candidate_source_repository must match ${thisRepo}, got ${candidateSourceRepository ?? '(missing)'}`
            )
          }

          if (caller !== 'manual' && caller !== 'automatic') {
            throw new Error(`caller must be manual or automatic, got ${caller ?? '(missing)'}`)
          }
          EOF

      - name: Recheck staleness after approval
        id: candidate-state
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          HEAD_SHA: ${{ inputs.head_sha }}
          PR_NUMBER: ${{ inputs.pr_number }}
          CALLER: ${{ inputs.caller }}
        with:
          script: |
            const headSha = process.env.HEAD_SHA;
            const prNumber = Number(process.env.PR_NUMBER);
            const caller = process.env.CALLER;
            const thisRepo = `${context.repo.owner}/${context.repo.repo}`;

            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
            });

            const isStale =
              pr.state !== "open" ||
              pr.head.repo.full_name !== thisRepo ||
              pr.head.sha !== headSha;

            const isAutomaticCandidate =
              caller === "automatic" &&
              (
                pr.draft ||
                pr.user.login !== "github-actions[bot]" ||
                pr.head.ref !== "release-please--branches--master" ||
                !pr.labels.some((label) => label.name === "autorelease: pending")
              );

            if (isStale || isAutomaticCandidate) {
              if (caller === "automatic") {
                core.setOutput("proceed", "false");
                await core.summary
                  .addHeading("Superseded")
                  .addRaw('superseded')
                  .addEOL()
                  .addRaw(
                    `Pull request #${prNumber} no longer matches the approved candidate identity for ${headSha}.`,
                  )
                  .write();
                return;
              }

              core.setFailed(
                `PR #${prNumber} is stale. Expected ${headSha}, found ${pr.head.sha}. Dispatch again with the current head.`,
              );
              return;
            }

            core.setOutput("proceed", "true");

      - name: Checkout candidate source
        if: steps.candidate-state.outputs.proceed == 'true'
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.head_sha }}
          path: .candidate-source
          persist-credentials: false

      - if: steps.candidate-state.outputs.proceed == 'true'
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 11.10.0

      - if: steps.candidate-state.outputs.proceed == 'true'
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .candidate-source/.node-version

      - name: Install candidate dependencies
        if: steps.candidate-state.outputs.proceed == 'true'
        working-directory: .candidate-source
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Verify and pin candidate action metadata
        if: steps.candidate-state.outputs.proceed == 'true'
        env:
          CANDIDATE_IMAGE: ${{ inputs.candidate_image }}
          OUTPUT_ACTION_PATH: ${{ github.workspace }}/.candidate-action/action.yml
        run: |
          node --input-type=module <<'EOF'
          import { mkdir, readFile, writeFile } from 'node:fs/promises'
          import path from 'node:path'
          import { pinActionMetadata } from './.candidate-source/src/e2e/candidate-image.ts'

          const image = process.env.CANDIDATE_IMAGE
          const outputActionPath = process.env.OUTPUT_ACTION_PATH

          if (!image || !outputActionPath) {
            throw new Error('Missing candidate pinning environment variables')
          }

          const actionMetadata = await readFile('./.candidate-source/action.yml', 'utf8')
          const pinnedMetadata = pinActionMetadata({
            actionMetadata,
            image
          })

          await mkdir(path.dirname(outputActionPath), {
            recursive: true
          })
          await writeFile(outputActionPath, pinnedMetadata)
          EOF

      - name: Build run-based app name
        if: steps.candidate-state.outputs.proceed == 'true'
        id: app-name
        env:
          RUN_ID: ${{ github.run_id }}
          RUN_ATTEMPT: ${{ github.run_attempt }}
        run: |
          node --input-type=module <<'EOF'
          import { appendFile } from 'node:fs/promises'
          import { buildE2EApplicationName } from './.candidate-source/src/e2e/clever-client.ts'

          const runId = process.env.RUN_ID
          const runAttempt = process.env.RUN_ATTEMPT
          const githubOutput = process.env.GITHUB_OUTPUT

          if (!runId || !runAttempt || !githubOutput) {
            throw new Error('Missing run identity for app naming')
          }

          const name = buildE2EApplicationName({ runId, runAttempt })
          await appendFile(githubOutput, `name=${name}\n`)
          EOF

      - name: Create fixture repository
        if: steps.candidate-state.outputs.proceed == 'true'
        id: fixture
        env:
          WORKSPACE_DIR: ${{ github.workspace }}
        run: |
          node --input-type=module <<'EOF'
          import { appendFile } from 'node:fs/promises'
          import { createFixtureRepository } from './.candidate-source/src/e2e/git-fixture.ts'

          const workspaceDir = process.env.WORKSPACE_DIR
          const githubOutput = process.env.GITHUB_OUTPUT
          if (!workspaceDir || !githubOutput) {
            throw new Error('Missing fixture setup outputs')
          }

          const fixture = await createFixtureRepository({ workspaceDir })
          await appendFile(githubOutput, `commit=${fixture.commit}\n`)
          EOF

      - name: Prepare evidence directories
        if: steps.candidate-state.outputs.proceed == 'true'
        env:
          E2E_STATE_DIR: ${{ github.workspace }}/.e2e-state
          E2E_ARTIFACTS_DIR: ${{ github.workspace }}/.e2e-artifacts/candidate-action
        run: |
          node --input-type=module <<'EOF'
          import { mkdir } from 'node:fs/promises'

          const stateDir = process.env.E2E_STATE_DIR
          const artifactsDir = process.env.E2E_ARTIFACTS_DIR

          if (!stateDir || !artifactsDir) {
            throw new Error('Missing evidence directories')
          }

          await Promise.all([
            mkdir(stateDir, {
              recursive: true,
            }),
            mkdir(artifactsDir, {
              recursive: true,
            }),
          ])
          EOF

      - name: Create personal Node.js app
        if: steps.candidate-state.outputs.proceed == 'true'
        id: create
        env:
          CLEVER_TOKEN: ${{ secrets.CLEVER_TOKEN }}
          CLEVER_SECRET: ${{ secrets.CLEVER_SECRET }}
          CLEVER_E2E_REGION: ${{ vars.CLEVER_E2E_REGION }}
          APP_NAME: ${{ steps.app-name.outputs.name }}
          APP_ID_FILE: ${{ github.workspace }}/.e2e-state/app.json
        run: |
          node --input-type=module <<'EOF'
          import { appendFile, mkdir, writeFile } from 'node:fs/promises'
          import { execFile } from 'node:child_process'
          import path from 'node:path'
          import { promisify } from 'node:util'
          import {
            createApplicationWithRecovery,
            createCleverController
          } from './.candidate-source/src/e2e/clever-client.ts'

          const execFileAsync = promisify(execFile)
          const githubOutput = process.env.GITHUB_OUTPUT
          const appName = process.env.APP_NAME
          const appIdFile = process.env.APP_ID_FILE
          const region = process.env.CLEVER_E2E_REGION || 'par'
          const cleverCLI = `${process.env.GITHUB_WORKSPACE}/.candidate-source/node_modules/.bin/clever`

          if (!githubOutput || !appName || !appIdFile) {
            throw new Error('Missing create-app workflow outputs')
          }

          await mkdir(path.dirname(appIdFile), {
            recursive: true
          })

          const controller = createCleverController({
            cleverCLI,
            runCommand: async (cli, args, { timeoutMs }) => {
              try {
                const { stdout, stderr } = await execFileAsync(cli, args, {
                  encoding: 'utf8',
                  env: process.env,
                  timeout: timeoutMs,
                  maxBuffer: 1024 * 1024 * 10,
                })
                return { stdout, stderr }
              } catch (error) {
                const commandError = new Error(error.stderr?.trim() || error.message)
                commandError.code = error.code
                commandError.signal = error.signal
                commandError.killed = error.killed
                throw commandError
              }
            },
          })

          const application = await createApplicationWithRecovery(controller, {
            name: appName,
            region,
          })

          try {
            await writeFile(appIdFile, JSON.stringify(application), 'utf8')
            await appendFile(
              githubOutput,
              `app_id=${application.appId}\n` + `app_name=${application.name}\n`,
            )
          } catch (error) {
            await controller.deleteApplication({
              appId: application.appId,
              name: application.name,
            })
            throw error
          }
          EOF

      - name: Remove provisioning link
        if: steps.candidate-state.outputs.proceed == 'true'
        run: rm -f .clever.json

      - name: Deploy healthy fixture commit
        if: steps.candidate-state.outputs.proceed == 'true'
        id: deploy-healthy
        uses: ./.candidate-action
        env:
          CLEVER_TOKEN: ${{ secrets.CLEVER_TOKEN }}
          CLEVER_SECRET: ${{ secrets.CLEVER_SECRET }}
        with:
          appID: ${{ steps.create.outputs.app_id }}
          timeout: 1200
          logFile: .e2e-artifacts/candidate-action/001-deploy-healthy.log
          setEnv: |
            CC_HEALTH_CHECK_PATH=/health

      - name: Observe healthy fixture deployment
        if: steps.candidate-state.outputs.proceed == 'true'
        id: observe-healthy
        env:
          CLEVER_TOKEN: ${{ secrets.CLEVER_TOKEN }}
          CLEVER_SECRET: ${{ secrets.CLEVER_SECRET }}
          APP_ID: ${{ steps.create.outputs.app_id }}
          FIXTURE_COMMIT: ${{ steps.fixture.outputs.commit }}
        run: |
          node --input-type=module <<'EOF'
          import { execFile } from 'node:child_process'
          import { appendFile } from 'node:fs/promises'
          import { promisify } from 'node:util'
          import { createCleverController } from './.candidate-source/src/e2e/clever-client.ts'
          import { waitForHealthyDeployment } from './.candidate-source/src/e2e/deployment-observer.ts'

          const execFileAsync = promisify(execFile)
          const appId = process.env.APP_ID
          const expectedCommitID = process.env.FIXTURE_COMMIT
          const githubOutput = process.env.GITHUB_OUTPUT
          const cleverCLI = `${process.env.GITHUB_WORKSPACE}/.candidate-source/node_modules/.bin/clever`

          if (!appId || !expectedCommitID || !githubOutput) {
            throw new Error('Missing deployment observation inputs')
          }

          const controller = createCleverController({
            cleverCLI,
            runCommand: async (cli, args, { timeoutMs }) => {
              try {
                const { stdout, stderr } = await execFileAsync(cli, args, {
                  encoding: 'utf8',
                  env: process.env,
                  timeout: timeoutMs,
                  maxBuffer: 1024 * 1024 * 10,
                })
                return { stdout, stderr }
              } catch (error) {
                throw new Error(error.stderr?.trim() || error.message)
              }
            },
          })

          const application = await controller.getApplication(appId)
          const healthURL = new URL('/health', `${application.deployURL}/`).toString()
          const health = await waitForHealthyDeployment({
            appId,
            healthURL,
            expectedScenario: 'healthy',
            expectedCommitID,
            listActivity: controller.listActivity,
            fetchHealth: async url => {
              const requestController = new AbortController()
              const timeoutId = setTimeout(() => requestController.abort(), 10_000)

              try {
                const response = await fetch(url, {
                  signal: requestController.signal
                })
                return {
                  status: response.status,
                  json: async () => response.json()
                }
              } finally {
                clearTimeout(timeoutId)
              }
            }
          })

          await appendFile(
            githubOutput,
            `instance_id=${health.INSTANCE_ID ?? ''}\n` +
              `deployment_id=${health.CC_DEPLOYMENT_ID ?? ''}\n` +
              `commit_id=${health.CC_COMMIT_ID ?? ''}\n`,
          )
          EOF

      - name: Generate padded health value
        if: steps.candidate-state.outputs.proceed == 'true'
        id: health-value
        run: |
          node --input-type=module <<'EOF'
          import { appendFile } from 'node:fs/promises'
          import { generateHealthValue, HEALTH_VALUE_ENV_NAME } from './.candidate-source/src/e2e/health-value.ts'

          const githubOutput = process.env.GITHUB_OUTPUT

          if (!githubOutput) {
            throw new Error('Missing GITHUB_OUTPUT for health value generation')
          }

          const value = generateHealthValue()
          if (!value.endsWith('==')) {
            throw new Error('Generated health value must use 16-byte base64 padding')
          }

          await appendFile(
            githubOutput,
            `name=${HEALTH_VALUE_ENV_NAME}\nvalue=${value}\n`,
          )
          EOF

      - name: Create second healthy fixture commit
        if: steps.candidate-state.outputs.proceed == 'true'
        id: second-healthy
        env:
          WORKSPACE_DIR: ${{ github.workspace }}
        run: |
          node --input-type=module <<'EOF'
          import { appendFile } from 'node:fs/promises'
          import { createHealthyFixtureCommit } from './.candidate-source/src/e2e/git-fixture.ts'

          const workspaceDir = process.env.WORKSPACE_DIR
          const githubOutput = process.env.GITHUB_OUTPUT

          if (!workspaceDir || !githubOutput) {
            throw new Error('Missing second fixture commit outputs')
          }

          const commit = await createHealthyFixtureCommit({
            workspaceDir,
            label: 'healthy-2'
          })

          await appendFile(githubOutput, `commit=${commit}\n`)
          EOF

      - name: Deploy healthy fixture commit with quiet env checks
        if: steps.candidate-state.outputs.proceed == 'true'
        id: deploy-env
        uses: ./.candidate-action
        env:
          CLEVER_TOKEN: ${{ secrets.CLEVER_TOKEN }}
          CLEVER_SECRET: ${{ secrets.CLEVER_SECRET }}
        with:
          appID: ${{ steps.create.outputs.app_id }}
          timeout: 1200
          quiet: true
          logFile: .e2e-artifacts/candidate-action/002-deploy-env.log
          setEnv: |
            CC_HEALTH_CHECK_PATH=/health
            E2E_SCENARIO=healthy
            E2E_HEALTH_VALUE=${{ steps.health-value.outputs.value }}

      - name: Observe healthy fixture env deployment
        if: steps.candidate-state.outputs.proceed == 'true'
        id: observe-env
        env:
          CLEVER_TOKEN: ${{ secrets.CLEVER_TOKEN }}
          CLEVER_SECRET: ${{ secrets.CLEVER_SECRET }}
          APP_ID: ${{ steps.create.outputs.app_id }}
          FIXTURE_COMMIT: ${{ steps.second-healthy.outputs.commit }}
          EXPECTED_HEALTH_VALUE: ${{ steps.health-value.outputs.value }}
        run: |
          node --input-type=module <<'EOF'
          import { execFile } from 'node:child_process'
          import { appendFile } from 'node:fs/promises'
          import { promisify } from 'node:util'
          import { createCleverController } from './.candidate-source/src/e2e/clever-client.ts'
          import { waitForHealthyDeployment } from './.candidate-source/src/e2e/deployment-observer.ts'

          const execFileAsync = promisify(execFile)
          const appId = process.env.APP_ID
          const expectedCommitID = process.env.FIXTURE_COMMIT
          const expectedHealthValue = process.env.EXPECTED_HEALTH_VALUE
          const githubOutput = process.env.GITHUB_OUTPUT
          const cleverCLI = `${process.env.GITHUB_WORKSPACE}/.candidate-source/node_modules/.bin/clever`

          if (!appId || !expectedCommitID || !expectedHealthValue || !githubOutput) {
            throw new Error('Missing env deployment observation inputs')
          }

          const controller = createCleverController({
            cleverCLI,
            runCommand: async (cli, args, { timeoutMs }) => {
              try {
                const { stdout, stderr } = await execFileAsync(cli, args, {
                  encoding: 'utf8',
                  env: process.env,
                  timeout: timeoutMs,
                  maxBuffer: 1024 * 1024 * 10,
                })
                return { stdout, stderr }
              } catch (error) {
                throw new Error(error.stderr?.trim() || error.message)
              }
            },
          })

          const application = await controller.getApplication(appId)
          const healthURL = new URL('/health', `${application.deployURL}/`).toString()
          const health = await waitForHealthyDeployment({
            appId,
            healthURL,
            expectedScenario: 'healthy',
            expectedCommitID,
            expectedHealthValue,
            listActivity: controller.listActivity,
            lookupEnvironmentValue: controller.getEnvironmentValue,
            fetchHealth: async url => {
              const requestController = new AbortController()
              const timeoutId = setTimeout(() => requestController.abort(), 10_000)

              try {
                const response = await fetch(url, {
                  signal: requestController.signal
                })
                return {
                  status: response.status,
                  json: async () => response.json()
                }
              } finally {
                clearTimeout(timeoutId)
              }
            }
          })

          await appendFile(
            githubOutput,
            `instance_id=${health.INSTANCE_ID ?? ''}\n` +
              `deployment_id=${health.CC_DEPLOYMENT_ID ?? ''}\n` +
              `commit_id=${health.CC_COMMIT_ID ?? ''}\n`,
          )
          EOF

      - name: Verify quiet deployment log markers
        if: steps.candidate-state.outputs.proceed == 'true'
        id: verify-env-log
        env:
          LOG_PATH: ${{ github.workspace }}/.e2e-artifacts/candidate-action/002-deploy-env.log
        run: |
          node --input-type=module <<'EOF'
          import { readFile } from 'node:fs/promises'
          import {
            FIXTURE_BUILD_MARKER,
            FIXTURE_START_MARKER
          } from './.candidate-source/src/e2e/fixture-app.ts'

          const logPath = process.env.LOG_PATH

          if (!logPath) {
            throw new Error('Missing quiet deployment log path')
          }

          const logContent = await readFile(logPath, 'utf8')
          for (const marker of [FIXTURE_BUILD_MARKER, FIXTURE_START_MARKER]) {
            if (!logContent.includes(marker)) {
              throw new Error(`Expected quiet deployment log to contain ${marker}`)
            }
          }
          EOF

      - name: Capture same-commit baseline state
        if: steps.candidate-state.outputs.proceed == 'true'
        id: same-commit-baseline
        env:
          CLEVER_TOKEN: ${{ secrets.CLEVER_TOKEN }}
          CLEVER_SECRET: ${{ secrets.CLEVER_SECRET }}
          APP_ID: ${{ steps.create.outputs.app_id }}
          STATE_PATH: ${{ github.workspace }}/.e2e-state/same-commit-state.json
          BASELINE_INSTANCE_ID: ${{ steps.observe-env.outputs.instance_id }}
          BASELINE_DEPLOYMENT_ID: ${{ steps.observe-env.outputs.deployment_id }}
          BASELINE_COMMIT_ID: ${{ steps.observe-env.outputs.commit_id }}
        run: |
          node --input-type=module <<'EOF'
          import { execFile } from 'node:child_process'
          import { writeFile } from 'node:fs/promises'
          import { promisify } from 'node:util'
          import { createCleverController } from './.candidate-source/src/e2e/clever-client.ts'

          const execFileAsync = promisify(execFile)
          const appId = process.env.APP_ID
          const statePath = process.env.STATE_PATH
          const instanceId = process.env.BASELINE_INSTANCE_ID
          const deploymentId = process.env.BASELINE_DEPLOYMENT_ID
          const commitId = process.env.BASELINE_COMMIT_ID
          const cleverCLI = `${process.env.GITHUB_WORKSPACE}/.candidate-source/node_modules/.bin/clever`

          if (!appId || !statePath || !instanceId || !deploymentId || !commitId) {
            throw new Error('Missing same-commit baseline inputs')
          }

          const controller = createCleverController({
            cleverCLI,
            runCommand: async (cli, args, { timeoutMs }) => {
              try {
                const { stdout, stderr } = await execFileAsync(cli, args, {
                  encoding: 'utf8',
                  env: process.env,
                  timeout: timeoutMs,
                  maxBuffer: 1024 * 1024 * 10,
                })
                return { stdout, stderr }
              } catch (error) {
                throw new Error(error.stderr?.trim() || error.message)
              }
            },
          })

          await writeFile(
            statePath,
            JSON.stringify(
              {
                activity: await controller.listActivity(appId),
                instanceId,
                deploymentId,
                commitId,
              },
              null,
              2,
            ),
            'utf8',
          )
          EOF

      - name: Deploy same commit with default error policy
        if: steps.candidate-state.outputs.proceed == 'true'
        id: same-commit-error
        continue-on-error: true
        uses: ./.candidate-action
        env:
          CLEVER_TOKEN: ${{ secrets.CLEVER_TOKEN }}
          CLEVER_SECRET: ${{ secrets.CLEVER_SECRET }}
        with:
          appID: ${{ steps.create.outputs.app_id }}
          timeout: 1200
          quiet: true
          logFile: .e2e-artifacts/candidate-action/003-same-commit-error.log

      - name: Assert same-commit error outcome and activity
        if: steps.candidate-state.outputs.proceed == 'true'
        id: assert-same-commit-error
        env:
          CLEVER_TOKEN: ${{ secrets.CLEVER_TOKEN }}
          CLEVER_SECRET: ${{ secrets.CLEVER_SECRET }}
          APP_ID: ${{ steps.create.outputs.app_id }}
          ACTION_OUTCOME: ${{ steps.same-commit-error.outcome }}
          STATE_PATH: ${{ github.workspace }}/.e2e-state/same-commit-state.json
          LOG_PATH: ${{ github.workspace }}/.e2e-artifacts/candidate-action/003-same-commit-error.log
        run: |
          node --input-type=module <<'EOF'
          import { execFile } from 'node:child_process'
          import { readFile } from 'node:fs/promises'
          import { promisify } from 'node:util'
          import { createCleverController } from './.candidate-source/src/e2e/clever-client.ts'
          import { confirmNoNewDeploymentActivity } from './.candidate-source/src/e2e/deployment-observer.ts'

          const execFileAsync = promisify(execFile)
          const appId = process.env.APP_ID
          const actionOutcome = process.env.ACTION_OUTCOME
          const statePath = process.env.STATE_PATH
          const logPath = process.env.LOG_PATH
          const cleverCLI = `${process.env.GITHUB_WORKSPACE}/.candidate-source/node_modules/.bin/clever`

          if (!appId || !actionOutcome || !statePath || !logPath) {
            throw new Error('Missing same-commit error assertion inputs')
          }

          if (actionOutcome !== 'failure') {
            throw new Error('Expected the default same-commit policy to fail')
          }

