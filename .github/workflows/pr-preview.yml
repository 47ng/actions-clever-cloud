name: PR Preview

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - "src/**/*.ts"
      - "!src/**/*.test.ts"
      - "Dockerfile"
      - "action.yml"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "tsconfig.json"
      - ".github/workflows/pr-preview.yml"
      - ".github/workflows/pr-preview-manual.yml"
      - ".github/workflows/*e2e*.yml"

permissions: {}

concurrency:
  group: pr-preview-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  build:
    name: Deploy on Docker
    # Previews only run on this repo's own branches, never forks. Fork PRs use the
    # `pull_request` trigger with a read-only token and no secrets, so they cannot
    # push images or read secrets; this guard just skips them cleanly.
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      tag: ${{ steps.docker-tag.outputs.tag }}
      sha: ${{ steps.sha.outputs.sha }}
      digest: ${{ steps.candidate.outputs.digest }}
      tags: ${{ steps.docker-labels-tags.outputs.tags }}
      labels: ${{ steps.docker-labels-tags.outputs.labels }}
    steps:
      - name: Checkout PR head
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .node-version

      - name: Get PR head SHA
        id: sha
        env:
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: echo "sha=$HEAD_SHA" >> "$GITHUB_OUTPUT"

      - name: Get Docker tag
        id: docker-tag
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: echo "tag=pr-$PR_NUMBER" >> "$GITHUB_OUTPUT"

      - name: Get package version
        id: package
        run: |
          if ! VERSION=$(jq -r '
            .version |
            if test("^[0-9]+\\.[0-9]+\\.[0-9]+(-[0-9A-Za-z.-]+)?(\\+[0-9A-Za-z.-]+)?$")
            then .
            else error("Invalid semver format in package.json")
            end
          ' package.json 2>&1); then
            echo "::error::$VERSION" # Expand the error into an annotation
            exit 1
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Collect Docker labels & tags
        id: docker-labels-tags
        env:
          PACKAGE_VERSION: ${{ steps.package.outputs.version }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          SHA: ${{ steps.sha.outputs.sha }}
          REPOSITORY: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
          DOCKER_TAG: ${{ steps.docker-tag.outputs.tag }}
        run: |
          {
            echo 'labels<<__LABELS_EOF__'
            echo "org.opencontainers.image.title=47ng/actions-clever-cloud"
            echo "org.opencontainers.image.description=GitHub action to deploy to Clever Cloud (PR preview)"
            echo "org.opencontainers.image.version=$PACKAGE_VERSION-pr.$PR_NUMBER"
            echo "org.opencontainers.image.revision=$SHA"
            echo "org.opencontainers.image.licenses=MIT"
            echo "org.opencontainers.image.source=https://github.com/$REPOSITORY/tree/$SHA"
            echo "org.opencontainers.image.documentation=https://github.com/$REPOSITORY/pull/$PR_NUMBER"
            echo "org.opencontainers.image.url=https://github.com/$REPOSITORY/actions/runs/$RUN_ID"
            echo '__LABELS_EOF__'
            echo 'tags<<__TAGS_EOF__'
            echo "ghcr.io/47ng/actions-clever-cloud:$DOCKER_TAG"
            echo "ghcr.io/47ng/actions-clever-cloud:git-$SHA"
            echo '__TAGS_EOF__'
          } >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Login to GitHub Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        id: docker-build-push
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha,scope=pr-preview-internal-${{ github.event.pull_request.number }}
          cache-to: type=gha,mode=max,scope=pr-preview-internal-${{ github.event.pull_request.number }}
          labels: "${{ steps.docker-labels-tags.outputs.labels }}"
          tags: "${{ steps.docker-labels-tags.outputs.tags }}"
          push: true

      - name: Verify and pin candidate action metadata
        id: candidate
        env:
          CANDIDATE_IMAGE: ghcr.io/47ng/actions-clever-cloud:git-${{ steps.sha.outputs.sha }}
          EXPECTED_REVISION: ${{ steps.sha.outputs.sha }}
          EXPECTED_SOURCE_REPOSITORY: ${{ github.repository }}
          OUTPUT_ACTION_PATH: ${{ github.workspace }}/.candidate-action.yml
        run: |
          node --input-type=module <<'EOF'
          import { appendFile, readFile, writeFile } from 'node:fs/promises'
          import { execFile } from 'node:child_process'
          import { promisify } from 'node:util'
          import { inspectCandidateImage, pinActionMetadata } from './src/e2e/candidate-image.ts'

          const execFileAsync = promisify(execFile)
          const image = process.env.CANDIDATE_IMAGE
          const expectedRevision = process.env.EXPECTED_REVISION
          const expectedSourceRepository = process.env.EXPECTED_SOURCE_REPOSITORY
          const outputActionPath = process.env.OUTPUT_ACTION_PATH
          const githubOutput = process.env.GITHUB_OUTPUT

          if (
            !image ||
            !expectedRevision ||
            !expectedSourceRepository ||
            !outputActionPath ||
            !githubOutput
          ) {
            throw new Error('Missing candidate verification environment variables')
          }

          const inspect = async format => {
            try {
              const { stdout, stderr } = await execFileAsync(
                'docker',
                ['buildx', 'imagetools', 'inspect', '--format', format, image],
                { encoding: 'utf8' }
              )
              return { exitCode: 0, stdout, stderr }
            } catch (error) {
              return {
                exitCode: error.code ?? 1,
                stdout: error.stdout ?? '',
                stderr: error.stderr ?? error.message
              }
            }
          }

          const candidate = await inspectCandidateImage({
            image,
            expectedRevision,
            expectedSourceRepository,
            inspect
          })

          if (!candidate) {
            throw new Error(`Missing candidate image ${image}`)
          }

          const actionMetadata = await readFile('action.yml', 'utf8')
          const pinnedMetadata = pinActionMetadata({
            actionMetadata,
            image: candidate.image
          })

          await writeFile(outputActionPath, pinnedMetadata)
          await appendFile(
            githubOutput,
            `digest=${candidate.digest}\n` +
              `image=${candidate.image}\n` +
              `action_metadata_path=${outputActionPath}\n`
          )
          EOF

      - name: Generate step summary
        env:
          STEP_SUMMARY_DIGEST: ${{ steps.candidate.outputs.digest }}
          STEP_SUMMARY_TAGS: ${{ steps.docker-labels-tags.outputs.tags }}
          STEP_SUMMARY_LABELS: ${{ steps.docker-labels-tags.outputs.labels }}
        run: |
          {
            echo "## 🐳 &nbsp;Docker image"
            echo "Digest: \`$STEP_SUMMARY_DIGEST\`"
            echo "### 📌 &nbsp;Tags"
            echo "\`\`\`"
            echo "$STEP_SUMMARY_TAGS"
            echo "\`\`\`"
            echo "### 🏷 &nbsp;Labels"
            echo "\`\`\`"
            echo "$STEP_SUMMARY_LABELS"
            echo "\`\`\`"
          } >> "$GITHUB_STEP_SUMMARY"

  # Isolated so the only `pull-requests: write` token in the workflow lives in a
  # job that runs no untrusted code (it never checks out the PR). All values are
  # passed via env, never interpolated into the script.
  comment:
    name: Comment on PR
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Comment on PR
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          TAG: ${{ needs.build.outputs.tag }}
          SHA: ${{ needs.build.outputs.sha }}
          DIGEST: ${{ needs.build.outputs.digest }}
          TAGS: ${{ needs.build.outputs.tags }}
          LABELS: ${{ needs.build.outputs.labels }}
        with:
          script: |
            const tag = process.env.TAG;
            const sha = process.env.SHA;
            const digest = process.env.DIGEST;
            const tags = process.env.TAGS;
            const labels = process.env.LABELS;
            const marker = "<!-- docker-build-comment -->";

            const body = [
              marker,
              "## 🐳 &nbsp;Docker image preview",
              "",
              "Preview this PR in your workflow:",
              "",
              "```yaml",
              "# Use the PR number to follow changes in this PR",
              `- uses: docker://ghcr.io/47ng/actions-clever-cloud:${tag}`,
              "",
              "# Use the git SHA for pinning to a specific commit",
              `- uses: docker://ghcr.io/47ng/actions-clever-cloud:git-${sha}`,
              "```",
              "",
              "<details>",
              "<summary>Image metadata</summary>",
              "",
              `Digest: \`${digest}\``,
              "",
              "### 📌 &nbsp;Tags",
              "```",
              tags,
              "```",
              "",
              "### 🏷 &nbsp;Labels",
              "```",
              labels,
              "```",
              "",
              "</details>",
              "",
              "---",
              "<sub>🤖 This comment is updated on every push</sub>",
            ].join("\n");

            // Find existing comment by marker
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.find(
              (comment) => comment.body && comment.body.startsWith(marker),
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
